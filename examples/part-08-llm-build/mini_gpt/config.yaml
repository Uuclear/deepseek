# mini_gpt 训练配置 — 可用 python train.py --config config.yaml 加载
training:
  epochs: 3
  batch_size: 32
  lr: 0.003
  block_size: 64

model:
  n_layer: 4
  n_head: 4
  n_embd: 128
  dropout: 0.1

logging:
  log_dir: checkpoints
  log_file: training_log.jsonl
  plot_file: training_curves.png

paths:
  corpus: data/corpus_zh_en.txt
